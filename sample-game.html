<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="我们的故事" />
  <meta name="theme-color" content="#1a1410" />
  <meta name="description" content="一个关于回忆与爱的互动叙事游戏" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-512.jpg" />
  <title>我们的故事</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0f0a; }
    #game-root {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Noto Serif SC', serif;
      color: #FFFFF0;
    }
    #scene-layer { position: absolute; inset: 0; z-index: 1; }
    #particle-canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
    #ui-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
    #ui-layer > * { pointer-events: auto; }
    #transition-overlay { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
    /* 宽度填满，高度自适应，不裁切不变形 */
    .scene-bg-image,
    .scene-bg,
    .parallax-layer {
      background-size: 100% auto !important;
      background-position: top center !important;
      background-color: #1a0f0a !important;
      background-repeat: no-repeat !important;
    }
  </style>
  <script type="module" crossorigin src="./assets/sampleGame-BZajwMw7.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/index-DzjGLEWQ.js">
  <link rel="stylesheet" crossorigin href="./assets/sampleGame-CXQz4h-T.css">
</head>
<body>
  <div id="game-root">
    <div id="scene-layer"></div>
    <canvas id="particle-canvas"></canvas>
    <div id="ui-layer"></div>
    <div id="transition-overlay"></div>
  </div>
  <script>
    // 注销所有旧 Service Worker，清除缓存
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var registration of registrations) {
          registration.unregister();
        }
      });
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var name of names) {
            caches.delete(name);
          }
        });
      }
    }
  </script>
</body>
</html>
